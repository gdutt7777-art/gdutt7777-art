<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Avatar: GD — Guru Dutt">
  <title>Guru Dutt — Avatar</title>
  <desc>Simple, professional circular avatar with a soft gradient and bold initials "GD".</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#7CC6FF"/>
      <stop offset="1" stop-color="#BDA8FF"/>
    </linearGradient>

    <radialGradient id="glow" cx="35%" cy="25%" r="60%">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feOffset dx="0" dy="6" result="off"/>
      <feMerge>
        <feMergeNode in="off"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer background circle -->
  <rect width="100%" height="100%" rx="72" fill="transparent"/>

  <g transform="translate(256,256)" filter="url(#softShadow)">
    <circle r="200" fill="url(#bgGrad)"/>
    <circle r="200" fill="url(#glow)"/>
    <!-- thin ring -->
    <circle r="200" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="6"/>
  </g>

  <!-- Monogram -->
  <text x="50%" y="50%" text-anchor="middle" dominant-baseline="central"
        font-family="Inter, Roboto, Arial, sans-serif"
        font-weight="800" font-size="168" fill="#ffffff" letter-spacing="-4">
    GD
  </text>

  <!-- Subtle lower accent (optional small tagline) -->
  <text x="50%" y="420" text-anchor="middle"
        font-family="Inter, Roboto, Arial, sans-serif"
        font-size="18" fill="#f3f6fb" opacity="0.85">
    Guru Dutt
  </text>
</svg>

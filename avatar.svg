<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Warrior avatar">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f6fbff"/>
      <stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" x2="1">
      <stop offset="0" stop-color="#FFDDAA"/>
      <stop offset="1" stop-color="#FFC4C4"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Soft sun/backdrop -->
  <circle cx="600" cy="140" r="120" fill="url(#sun)" opacity="0.95" filter="url(#soft)"/>

  <!-- Distant stylized army -->
  <g fill="#e6eef6" opacity="0.9" transform="translate(0,80)">
    <g transform="translate(120,360) scale(1)">
      <rect x="0" y="0" width="12" height="32" rx="3" />
      <circle cx="6" cy="-6" r="5.5"/>
    </g>
    <g transform="translate(240,370) scale(1)">
      <rect x="0" y="0" width="12" height="28" rx="3" />
      <circle cx="6" cy="-6" r="5.5"/>
    </g>
    <g transform="translate(360,365) scale(1)">
      <rect x="0" y="0" width="12" height="30" rx="3" />
      <circle cx="6" cy="-6" r="5.5"/>
    </g>
    <g transform="translate(480,360) scale(1)">
      <rect x="0" y="0" width="12" height="32" rx="3" />
      <circle cx="6" cy="-6" r="5.5"/>
    </g>
    <g transform="translate(600,370) scale(1)">
      <rect x="0" y="0" width="12" height="28" rx="3" />
      <circle cx="6" cy="-6" r="5.5"/>
    </g>
    <g transform="translate(720,365) scale(1)">
      <rect x="0" y="0" width="12" height="30" rx="3" />
      <circle cx="6" cy="-6" r="5.5"/>
    </g>
    <g transform="translate(840,360) scale(1)">
      <rect x="0" y="0" width="12" height="32" rx="3" />
      <circle cx="6" cy="-6" r="5.5"/>
    </g>
  </g>

  <!-- Foreground ground -->
  <ellipse cx="600" cy="700" rx="700" ry="120" fill="#f0f5fb" opacity="0.9"/>

  <!-- Warrior silhouette (center foreground) -->
  <g transform="translate(600,440) scale(1)">
    <!-- cloak -->
    <path d="M-80 220 C -120 160 -100 90 -40 30 L-10 -40 C -10 -40 0 -80 40 -80 C 80 -80 90 -40 90 -40 L120 30 C 180 90 160 160 120 220 Z"
          fill="#0b2540" opacity="0.95" />
    <!-- body -->
    <rect x="-18" y="-68" width="36" height="88" rx="6" fill="#071833"/>
    <!-- head -->
    <circle cx="0" cy="-92" r="18" fill="#071833" />
    <!-- sword (held forward) -->
    <g transform="translate(46,-12) rotate(-22)">
      <rect x="-6" y="-120" width="12" height="150" rx="4" fill="#e8eef6" />
      <rect x="-12" y="-24" width="24" height="10" rx="2" fill="#bfc9d6"/>
    </g>
    <!-- shield (on left) -->
    <g transform="translate(-62,8) rotate(-8)">
      <ellipse cx="0" cy="0" rx="36" ry="46" fill="#0c2a47" stroke="#153651" stroke-width="2"/>
      <rect x="-6" y="-20" width="12" height="40" rx="2" fill="#071833"/>
    </g>
    <!-- subtle highlight on cloak -->
    <path d="M-80 220 C -40 150 -50 90 -20 40" stroke="#2b4b6a" stroke-width="6" fill="none" opacity="0.12"/>
  </g>

  <!-- Signature -->
  <text x="32" y="780" font-family="Segoe UI, Roboto, Arial, sans-serif" font-size="14" fill="#6b7f8f">Guru Dutt — Warrior of Code</text>
</svg>

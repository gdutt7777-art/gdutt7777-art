<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="140" viewBox="0 0 1000 140" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hello I am Guru Dutt">
  <defs>
    <!-- background gradient: soft warm -> cool -->
    <linearGradient id="bgWarm" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#FFF3E6"/> <!-- warm -->
      <stop offset="1" stop-color="#E6F9FF"/> <!-- cool -->
    </linearGradient>

    <linearGradient id="lightGrad" x1="0" x2="1">
      <stop offset="0" stop-color="#CFF7FF"/>
      <stop offset="0.5" stop-color="#E6F7D9"/>
      <stop offset="1" stop-color="#FFE4D6"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0" x2="1">
      <stop offset="0" stop-color="#7CC6FF"/>
      <stop offset="1" stop-color="#BDA8FF"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.12"/>
    </filter>

    <!-- subtle vignette to warm the edges slightly -->
    <radialGradient id="vignette" cx="10%" cy="10%" r="100%">
      <stop offset="0" stop-color="rgba(255,255,255,0)" />
      <stop offset="1" stop-color="rgba(255,230,210,0.06)" />
    </radialGradient>
  </defs>

  <!-- Warm-to-cool background -->
  <rect width="1000" height="140" fill="url(#bgWarm)"/>

  <!-- soft vignette overlay -->
  <rect width="1000" height="140" fill="url(#vignette)" />

  <!-- Decorative left accent (now warm-tinted) -->
  <rect x="28" y="24" width="6" height="92" rx="3" fill="#FFDCC2" opacity="0.98"/>

  <!-- Greeting block with bold typography -->
  <g transform="translate(56,28)" filter="url(#softShadow)">
    <text x="0" y="18" font-family="Inter, Roboto, Arial, sans-serif" font-size="18" fill="#546872" font-weight="600">
      Hello, I am
    </text>

    <text x="0" y="74" font-family="Inter, Roboto, Arial, sans-serif" font-size="44" font-weight="800" fill="url(#nameGrad)">
      Guru Dutt
    </text>

    <text x="340" y="74" font-family="Inter, Roboto, Arial, sans-serif" font-size="14" fill="#546872" font-weight="700">
      — Warrior of Code · Full‑Stack Web Developer
    </text>
  </g>

  <!-- Light skill chips on the right (softened to match warm background) -->
  <g transform="translate(700,28)">
    <rect x="0" y="0" rx="10" width="86" height="32" fill="#FFF6F0" stroke="#FFE3D0"/>
    <text x="14" y="22" font-family="Inter, Roboto, Arial, sans-serif" font-size="13" fill="#D85B3B" font-weight="700">HTML</text>

    <rect x="96" y="0" rx="10" width="86" height="32" fill="#FFF9ED" stroke="#FFE9B8"/>
    <text x="110" y="22" font-family="Inter, Roboto, Arial, sans-serif" font-size="13" fill="#C67A00" font-weight="700">Java</text>

    <rect x="192" y="0" rx="10" width="86" height="32" fill="#F6FFF6" stroke="#E6F7E8"/>
    <text x="206" y="22" font-family="Inter, Roboto, Arial, sans-serif" font-size="13" fill="#2E7D3E" font-weight="700">Python</text>
  </g>
</svg>
